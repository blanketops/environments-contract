name: Validate & Generate Contracts
on:
  push:
    branches:
      - main
      - develop
      - feature/**
      - release/**
      - hotfix/**
      - bugfix/**
  pull_request:
    branches:
      - main
      - develop
jobs:
  buf:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: false

      - name: Install Go protobuf plugins
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest

      - name: Setup Buf
        uses: bufbuild/buf-setup-action@v1
        with:
          version: latest

      - name: Buf Lint
        run: buf lint

      - name: Buf Breaking Check
        run: |
          buf breaking \
            --against '.git#branch=main' \
            || echo "⚠️ Breaking changes detected (allowed outside v1)"

      - name: Buf Generate
        run: buf generate

      - name: Upload generated contracts
        uses: actions/upload-artifact@v4
        with:
          name: generated-contracts
          path: gen/
          retention-days: 7
