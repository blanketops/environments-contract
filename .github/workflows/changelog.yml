name: Generate Changelog

on:
    push:
        tags:
            - "v*"

jobs:
    changelog:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Install git-cliff
              run: |
                  curl -sSL https://github.com/orhun/git-cliff/releases/download/v2.6.0/git-cliff-2.6.0-x86_64-unknown-linux-gnu.tar.gz \
                  | tar -xz
                   sudo mv git-cliff-*/git-cliff /usr/local/bin/git-cliff
                   git-cliff --version

            - name: Generate CHANGELOG.md
              run: |
                  git-cliff --latest --output CHANGELOG.md

            - name: Commit changelog
              run: |
                  git config user.name "ntlaletsi70"
                  git config user.email "ntlaletsi86@gmail.com"
                  git fetch origin main
                  git checkout main
                  git add .github/CHANGELOG.md
                  git commit -m "chore(changelog): update changelog for ${GITHUB_REF_NAME}" || echo "No changes"
                  git push origin main
