name: Generate Changelog

on:
    push:
        tags:
            - "v*"

permissions:
    contents: write

jobs:
    changelog:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Install git-cliff
              run: |
                  curl -sSL https://github.com/orhun/git-cliff/releases/download/v2.6.0/git-cliff-2.6.0-x86_64-unknown-linux-gnu.tar.gz \
                    | tar -xz
                  sudo mv git-cliff-*/git-cliff /usr/local/bin/git-cliff
                  git-cliff --version

            - name: Generate CHANGELOG.md
              run: |
                  git-cliff --latest --output CHANGELOG.md

            - name: Commit changelog to main
              run: |
                  git config user.name "ntlaletsi70"
                  git config user.email "ntlaletsi86@gmail.com"

                  # Make sure main exists locally and is checked out
                  git fetch origin main
                  git switch -c main origin/main || git switch main

                  git add CHANGELOG.md
                  git commit -m "chore(changelog): update changelog for ${GITHUB_REF_NAME}" || echo "No changes"
                  git push origin main
