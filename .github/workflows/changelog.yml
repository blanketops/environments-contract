name: Generate Changelog

on:
    workflow_dispatch:
    push:
        tags:
            - "v*"

jobs:
    changelog:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Install git-cliff
              run: |
                  curl -sSL https://github.com/orhun/git-cliff/releases/latest/download/git-cliff-linux-amd64.tar.gz \
                  | tar xz
                  sudo mv git-cliff /usr/local/bin/

            - name: Generate CHANGELOG.md
              run: |
                  git-cliff --tag $(git describe --tags --abbrev=0 2>/dev/null || echo "") \
                    -o CHANGELOG.md

            - name: Commit changelog
              run: |
                  git config user.name "blanketops-bot"
                  git config user.email "bot@blanketops.dev"
                  git add CHANGELOG.md
                  git commit -m "chore(changelog): update changelog" || echo "No changes"
                  git push
