name: Generate Changelog

on:
    push:
        tags:
            - "v*"

jobs:
    changelog:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Install git-cliff
              run: |
                  curl -sSL https://github.com/orhun/git-cliff/releases/latest/download/git-cliff-linux-amd64 \
                    -o git-cliff
                  chmod +x git-cliff
                  sudo mv git-cliff /usr/local/bin/git-cliff

            - name: Generate CHANGELOG.md
              run: |
                  git-cliff --latest --output CHANGELOG.md

            - name: Commit changelog
              run: |
                  git config user.name "blanketops-bot"
                  git config user.email "bot@blanketops.dev"
                  git add CHANGELOG.md
                  git commit -m "chore(changelog): update changelog for ${GITHUB_REF_NAME}" || echo "No changes"
                  git push
