name: Release
on:
  push:
    tags:
      - "v*"
permissions:
  contents: write
jobs:
  release:
    runs-on: self-hosted
    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout main
        run: |
          git checkout main
          git pull origin main

      - name: Generate CHANGELOG.md
        run: git-cliff --config .cliff.toml --output CHANGELOG.md

      - name: Commit changelog
        run: |
          git add CHANGELOG.md
          git commit -m "chore(release): update changelog for ${{ github.ref_name }}" || echo "No changes"
          git push origin main

      - name: Generate release notes
        run: git-cliff --config .cliff.toml --latest --output RELEASE_NOTES.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Release Summary
        run: |
          cat >> $GITHUB_STEP_SUMMARY <<EOF
          # 📦 GitHub Release Published
          **Version:** \`${{ github.ref_name }}\`
          ## Completed
          - Generated Go and TypeScript contracts via \`mage gen\`
          - Committed generated contracts to main
          - Generated CHANGELOG.md using git-cliff
          - Committed changelog updates to main
          - Generated release notes
          - Published GitHub Release
          ## Artifacts
          - blanketops/ (Go .pb.go + TypeScript _pb.ts, committed to main)
          - CHANGELOG.md
          - RELEASE_NOTES.md
          - GitHub Release
          ## Source Tag
          \`${{ github.ref_name }}\`
          EOF
