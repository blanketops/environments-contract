syntax = "proto3";

package blanketops.environments.v1alpha1;

option go_package = "github.com/ntlaletsi70/blanketops-environments-contract/gen/go/environments/v1alpha1;v1alpha1";

import "google/protobuf/timestamp.proto";


// -----------------------------------------------------------------------------
// Package
// -----------------------------------------------------------------------------

message Package {
  PackageSpec spec = 1;
  PackageStatus status = 2;
}


// -----------------------------------------------------------------------------
// Spec
// -----------------------------------------------------------------------------

message PackageSpec {
  // Whether this package is enabled
  bool enabled = 1;

  // Logical name of the package
  string name = 2;

  // Version identifier
  string version = 3;

  // Package maintainers
  repeated Maintainer maintainers = 4;

  // Human-readable description
  string description = 5;

  // Source repository containing package definitions
  PackageRepository repository = 6;

  // Enable diff preview during reconciliation
  bool diff_enabled = 7;

  // Repository where rendered/applied state is stored
  StateRepository state_repository = 8;
}


// -----------------------------------------------------------------------------
// Repositories
// -----------------------------------------------------------------------------

message PackageRepository {
  string url = 1;
  string credentials_secret = 2;
}

message StateRepository {
  string url = 1;
  string ref = 2;
  string clone_secret = 3;
  string strategy = 4;
  string path = 5;
}


// -----------------------------------------------------------------------------
// Maintainers
// -----------------------------------------------------------------------------

message Maintainer {
  string name = 1;
  string email = 2;
}


// -----------------------------------------------------------------------------
// Status
// -----------------------------------------------------------------------------

message PackageStatus {
  PackagePhase phase = 1;

  // Human-readable status
  string message = 2;

  // Last reconciliation attempt
  google.protobuf.Timestamp last_reconciled_at = 3;

  // Indicates whether the last diff resulted in changes
  bool diff_applied = 4;

  // Raw diff output (for audit/debug)
  string diff_output = 5;

  // Applied source-of-truth state
  PackageState state = 6;
}


// -----------------------------------------------------------------------------
// Applied State
// -----------------------------------------------------------------------------

message PackageState {
  string repository = 1;
  string revision = 2;
}


// -----------------------------------------------------------------------------
// Enums
// -----------------------------------------------------------------------------

enum PackagePhase {
  PACKAGE_PHASE_UNSPECIFIED = 0;
  PACKAGE_PHASE_PENDING = 1;
  PACKAGE_PHASE_READY = 2;
  PACKAGE_PHASE_FAILED = 3;
}
