[changelog]
header = """
# Changelog

All notable changes to this project will be documented in this file.
"""

body = """
{% for group, commits in commits | group_by(attribute="group") %}
## {{ group }}
{% for commit in commits %}
- {{ commit.message | trim }}
{% endfor %}
{% endfor %}
"""

footer = """
"""

trim = true

[git]
conventional_commits = false
filter_unconventional = false
sort_commits = "oldest"
tag_pattern = "v[0-9]*"

[[git.commit_parsers]]
group = "Features"
message = "^feat"

[[git.commit_parsers]]
group = "Bug Fixes"
message = "^fix"

[[git.commit_parsers]]
group = "Documentation"
message = "^docs"

[[git.commit_parsers]]
group = "Refactoring"
message = "^refactor"

[[git.commit_parsers]]
group = "Chores"
message = "^chore"

[[git.commit_parsers]]
group = "Other"
message = ".*"
