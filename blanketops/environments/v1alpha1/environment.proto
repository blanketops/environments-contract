syntax = "proto3";

package blanketops.environments.v1alpha1;

import "blanketops/environments/common/v1/event.proto";
import "blanketops/environments/common/v1/metadata.proto";
import "google/protobuf/timestamp.proto";

option csharp_namespace = "BlanketOps.Environments.V1Alpha1";
option go_package = "github.com/ntlaletsi70/blanketops-environments-contract/blanketops/environments/v1alpha1;v1alpha1";

// -----------------------------------------------------------------------------
// Resource
// -----------------------------------------------------------------------------

message Environment {
  blanketops.environments.common.v1.Metadata metadata = 1;
  EnvironmentSpec spec = 2;
  EnvironmentStatus status = 3;
}

// -----------------------------------------------------------------------------
// Spec (INTENT)
// -----------------------------------------------------------------------------

message EnvironmentSpec {
  string application_name = 1;
  string branch = 2;
  string git_owner = 3;
  EnvironmentType environment_type = 4;
  string version = 5;
  string description = 6;
  repeated EnvironmentServiceUnitRef service_units = 7;
  EnvironmentDeploymentRef deployment = 8;
  EnvironmentRouteRef route = 9;
  EnvironmentPackageRef package = 10;
  EnvironmentBuildRef build = 11;
  repeated EnvironmentBuildTriggerRef build_triggers = 12;
}

// -----------------------------------------------------------------------------
// References (composition, not ownership)
// -----------------------------------------------------------------------------

message EnvironmentBuildRef {
  string name = 1;
}

message EnvironmentBuildTriggerRef {
  string name = 1;
}

message EnvironmentServiceUnitRef {
  string name = 1;
}

message EnvironmentDeploymentRef {
  string name = 1;
}

message EnvironmentRouteRef {
  string name = 1;
}

message EnvironmentPackageRef {
  string name = 1;
}

// -----------------------------------------------------------------------------
// Status (SYSTEM STATE)
// -----------------------------------------------------------------------------

message EnvironmentStatus {
  repeated EnvironmentCondition conditions = 1;
  google.protobuf.Timestamp observed_at = 2;
  int64 observed_generation = 3;
}

message EnvironmentCondition {
  string type = 1;
  string status = 2;
  string reason = 3;
  string message = 4;
  google.protobuf.Timestamp last_transition_time = 5;
}

// -----------------------------------------------------------------------------
// Enums
// -----------------------------------------------------------------------------

enum EnvironmentType {
  ENVIRONMENT_TYPE_UNSPECIFIED = 0;
  ENVIRONMENT_TYPE_DEVELOPMENT = 1;
  ENVIRONMENT_TYPE_STAGING = 2;
  ENVIRONMENT_TYPE_PRODUCTION = 3;
  ENVIRONMENT_TYPE_TESTING = 4;
}

// -----------------------------------------------------------------------------
// Requests / Responses
// -----------------------------------------------------------------------------

message CreateEnvironmentRequest {
  EnvironmentSpec spec = 1;
}

message CreateEnvironmentResponse {
  Environment environment = 1;
}

message GetEnvironmentRequest {
  string name = 1;
}

message GetEnvironmentResponse {
  Environment environment = 1;
}

message ListEnvironmentsRequest {}

message ListEnvironmentsResponse {
  repeated Environment environments = 1;
}

message DeleteEnvironmentRequest {
  string name = 1;
}

message DeleteEnvironmentResponse {}

message WatchEnvironmentRequest {
  string name = 1;
  string label_selector = 2;
}

message WatchEnvironmentResponse {
  Environment environment = 1;
  blanketops.environments.common.v1.EventType type = 2;
}

// -----------------------------------------------------------------------------
// Service
// -----------------------------------------------------------------------------

service EnvironmentService {
  rpc CreateEnvironment(CreateEnvironmentRequest) returns (CreateEnvironmentResponse);
  rpc GetEnvironment(GetEnvironmentRequest) returns (GetEnvironmentResponse);
  rpc ListEnvironments(ListEnvironmentsRequest) returns (ListEnvironmentsResponse);
  rpc DeleteEnvironment(DeleteEnvironmentRequest) returns (DeleteEnvironmentResponse);
  rpc WatchEnvironment(WatchEnvironmentRequest) returns (stream WatchEnvironmentResponse);
}
