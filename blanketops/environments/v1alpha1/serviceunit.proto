syntax = "proto3";

package blanketops.environments.v1alpha1;

import "blanketops/environments/common/v1/event.proto";
import "blanketops/environments/common/v1/metadata.proto";
import "google/protobuf/timestamp.proto";

option csharp_namespace = "BlanketOps.Environments.V1Alpha1";
option go_package = "github.com/ntlaletsi70/blanketops-environments-contract/blanketops/environments/v1alpha1;v1alpha1";

// -----------------------------------------------------------------------------
// Resource
// -----------------------------------------------------------------------------

message ServiceUnit {
  blanketops.environments.common.v1.Metadata metadata = 1;
  ServiceUnitSpec spec = 2;
  ServiceUnitStatus status = 3;
}

// -----------------------------------------------------------------------------
// Spec (INTENT)
// -----------------------------------------------------------------------------

message ServiceUnitSpec {
  ServiceUnitPackageRef package = 1;
  ServiceUnitRuntime runtime = 2;
  int32 replicas = 3;
  map<string, string> env = 4;
  ServiceUnitResources resources = 5;
  repeated string command = 6;
  repeated string args = 7;
}

// -----------------------------------------------------------------------------
// References
// -----------------------------------------------------------------------------

message ServiceUnitPackageRef {
  string name = 1;
}

// -----------------------------------------------------------------------------
// Resources
// -----------------------------------------------------------------------------

message ServiceUnitResources {
  string cpu = 1;
  string memory = 2;
}

// -----------------------------------------------------------------------------
// Status (SYSTEM STATE)
// -----------------------------------------------------------------------------

message ServiceUnitStatus {
  ServiceUnitPhase phase = 1;
  string message = 2;
  int32 available_replicas = 3;
  ServiceUnitRuntime runtime = 4;
  google.protobuf.Timestamp observed_at = 5;
  int64 observed_generation = 6;
}

// -----------------------------------------------------------------------------
// Enums
// -----------------------------------------------------------------------------

enum ServiceUnitRuntime {
  SERVICE_UNIT_RUNTIME_UNSPECIFIED = 0;
  SERVICE_UNIT_RUNTIME_KUBERNETES_CONTAINER = 1;
  SERVICE_UNIT_RUNTIME_KNATIVE_SERVICE = 2;
  SERVICE_UNIT_RUNTIME_WASM = 3;
}

enum ServiceUnitPhase {
  SERVICE_UNIT_PHASE_UNSPECIFIED = 0;
  SERVICE_UNIT_PHASE_PENDING = 1;
  SERVICE_UNIT_PHASE_DEPLOYING = 2;
  SERVICE_UNIT_PHASE_READY = 3;
  SERVICE_UNIT_PHASE_FAILED = 4;
}

// -----------------------------------------------------------------------------
// Requests / Responses
// -----------------------------------------------------------------------------

message CreateServiceUnitRequest {
  ServiceUnitSpec spec = 1;
}

message CreateServiceUnitResponse {
  ServiceUnit service_unit = 1;
}

message GetServiceUnitRequest {
  string name = 1;
}

message GetServiceUnitResponse {
  ServiceUnit service_unit = 1;
}

message ListServiceUnitsRequest {}

message ListServiceUnitsResponse {
  repeated ServiceUnit service_units = 1;
}

message DeleteServiceUnitRequest {
  string name = 1;
}

message DeleteServiceUnitResponse {}

message WatchServiceUnitRequest {
  string name = 1;
  string label_selector = 2;
}

message WatchServiceUnitResponse {
  ServiceUnit service_unit = 1;
  blanketops.environments.common.v1.EventType type = 2;
}

// -----------------------------------------------------------------------------
// Service
// -----------------------------------------------------------------------------

service ServiceUnitService {
  rpc CreateServiceUnit(CreateServiceUnitRequest) returns (CreateServiceUnitResponse);
  rpc GetServiceUnit(GetServiceUnitRequest) returns (GetServiceUnitResponse);
  rpc ListServiceUnits(ListServiceUnitsRequest) returns (ListServiceUnitsResponse);
  rpc DeleteServiceUnit(DeleteServiceUnitRequest) returns (DeleteServiceUnitResponse);
  rpc WatchServiceUnit(WatchServiceUnitRequest) returns (stream WatchServiceUnitResponse);
}
