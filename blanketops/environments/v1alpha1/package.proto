syntax = "proto3";

package blanketops.environments.v1alpha1;

import "blanketops/environments/common/v1/event.proto";
import "blanketops/environments/common/v1/metadata.proto";
import "google/protobuf/timestamp.proto";

option csharp_namespace = "BlanketOps.Environments.V1Alpha1";
option go_package = "github.com/ntlaletsi70/blanketops-environments-contract/blanketops/environments/v1alpha1;v1alpha1";

// -----------------------------------------------------------------------------
// Resource
// -----------------------------------------------------------------------------

message Package {
  blanketops.environments.common.v1.Metadata metadata = 1;
  PackageSpec spec = 2;
  PackageStatus status = 3;
}

// -----------------------------------------------------------------------------
// Spec (USER INTENT / ARTIFACT DEFINITION)
// -----------------------------------------------------------------------------

message PackageSpec {
  string version = 1;
  PackageBuildRef build = 2;
  string artifact = 3;
  PackageType type = 4;
  string promotion_target = 5;
  map<string, string> metadata = 6;
}

// -----------------------------------------------------------------------------
// References
// -----------------------------------------------------------------------------

message PackageBuildRef {
  string name = 1;
}

// -----------------------------------------------------------------------------
// Status (SYSTEM STATE)
// -----------------------------------------------------------------------------

message PackageStatus {
  PackagePhase phase = 1;
  string artifact = 2;
  string digest = 3;
  string message = 4;
  google.protobuf.Timestamp observed_at = 5;
  int64 observed_generation = 6;
}

// -----------------------------------------------------------------------------
// Enums
// -----------------------------------------------------------------------------

enum PackageType {
  PACKAGE_TYPE_UNSPECIFIED = 0;
  PACKAGE_TYPE_CONTAINER_IMAGE = 1;
  PACKAGE_TYPE_HELM_CHART = 2;
  PACKAGE_TYPE_WASM_MODULE = 3;
  PACKAGE_TYPE_BINARY = 4;
}

enum PackagePhase {
  PACKAGE_PHASE_UNSPECIFIED = 0;
  PACKAGE_PHASE_PENDING = 1;
  PACKAGE_PHASE_RESOLVED = 2;
  PACKAGE_PHASE_READY = 3;
  PACKAGE_PHASE_FAILED = 4;
}

// -----------------------------------------------------------------------------
// Requests / Responses
// -----------------------------------------------------------------------------

message CreatePackageRequest {
  PackageSpec spec = 1;
}

message CreatePackageResponse {
  Package package = 1;
}

message GetPackageRequest {
  string name = 1;
}

message GetPackageResponse {
  Package package = 1;
}

message ListPackagesRequest {}

message ListPackagesResponse {
  repeated Package packages = 1;
}

message DeletePackageRequest {
  string name = 1;
}

message DeletePackageResponse {}

message WatchPackageRequest {
  string name = 1;
  string label_selector = 2;
}

message WatchPackageResponse {
  Package package = 1;
  blanketops.environments.common.v1.EventType type = 2;
}

// -----------------------------------------------------------------------------
// Service
// -----------------------------------------------------------------------------

service PackageService {
  rpc CreatePackage(CreatePackageRequest) returns (CreatePackageResponse);
  rpc GetPackage(GetPackageRequest) returns (GetPackageResponse);
  rpc ListPackages(ListPackagesRequest) returns (ListPackagesResponse);
  rpc DeletePackage(DeletePackageRequest) returns (DeletePackageResponse);
  rpc WatchPackage(WatchPackageRequest) returns (stream WatchPackageResponse);
}
