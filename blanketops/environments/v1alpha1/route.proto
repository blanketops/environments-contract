syntax = "proto3";

package blanketops.environments.v1alpha1;

import "blanketops/environments/common/v1/event.proto";
import "blanketops/environments/common/v1/metadata.proto";
import "google/protobuf/timestamp.proto";

option csharp_namespace = "BlanketOps.Environments.V1Alpha1";
option go_package = "github.com/ntlaletsi70/blanketops-environments-contract/blanketops/environments/v1alpha1;v1alpha1";

// -----------------------------------------------------------------------------
// Resource
// -----------------------------------------------------------------------------

message Route {
  blanketops.environments.common.v1.Metadata metadata = 1;
  RouteSpec spec = 2;
  RouteStatus status = 3;
}

// -----------------------------------------------------------------------------
// Spec (INTENT)
// -----------------------------------------------------------------------------

message RouteSpec {
  // Fully qualified domain name
  string host = 1;
  // Whether the route is active
  bool enabled = 2;
  // HTTP path to match ("/", "/v1", etc.)
  string path = 3;
  // Whether TLS is required
  bool tls_enabled = 4;
  // Runtime responsible for materializing this route
  RouteRuntime runtime = 5;
}

// -----------------------------------------------------------------------------
// Status (SYSTEM STATE)
// -----------------------------------------------------------------------------

message RouteStatus {
  RoutePhase phase = 1;
  string message = 2;
  // Resolved address or endpoint (LB hostname, URL, etc.)
  string resolved_address = 3;
  TLSStatus tls_status = 4;
  repeated RouteCondition conditions = 5;
  google.protobuf.Timestamp observed_at = 6;
  int64 observed_generation = 7;
}

// -----------------------------------------------------------------------------
// Conditions
// -----------------------------------------------------------------------------

message RouteCondition {
  string type = 1;
  string status = 2;
  string reason = 3;
  string message = 4;
  google.protobuf.Timestamp last_transition_time = 5;
}

// -----------------------------------------------------------------------------
// Enums
// -----------------------------------------------------------------------------

enum RoutePhase {
  ROUTE_PHASE_UNSPECIFIED = 0;
  ROUTE_PHASE_PENDING = 1;
  ROUTE_PHASE_READY = 2;
  ROUTE_PHASE_DEGRADED = 3;
  ROUTE_PHASE_FAILED = 4;
}

enum RouteRuntime {
  ROUTE_RUNTIME_UNSPECIFIED = 0;
  ROUTE_RUNTIME_KUBERNETES_CONTAINER = 1;
  ROUTE_RUNTIME_KNATIVE_SERVICE = 2;
  ROUTE_RUNTIME_GATEWAY_API = 3;
}

enum TLSStatus {
  TLS_STATUS_UNSPECIFIED = 0;
  TLS_STATUS_DISABLED = 1;
  TLS_STATUS_PROVISIONING = 2;
  TLS_STATUS_ACTIVE = 3;
  TLS_STATUS_FAILED = 4;
}

// -----------------------------------------------------------------------------
// Requests / Responses
// -----------------------------------------------------------------------------

message CreateRouteRequest {
  RouteSpec spec = 1;
}

message CreateRouteResponse {
  Route route = 1;
}

message GetRouteRequest {
  string name = 1;
}

message GetRouteResponse {
  Route route = 1;
}

message ListRoutesRequest {}

message ListRoutesResponse {
  repeated Route routes = 1;
}

message DeleteRouteRequest {
  string name = 1;
}

message DeleteRouteResponse {}

message WatchRouteRequest {
  string name = 1;
  string label_selector = 2;
}

message WatchRouteResponse {
  Route route = 1;
  blanketops.environments.common.v1.EventType type = 2;
}

// -----------------------------------------------------------------------------
// Service
// -----------------------------------------------------------------------------

service RouteService {
  rpc CreateRoute(CreateRouteRequest) returns (CreateRouteResponse);
  rpc GetRoute(GetRouteRequest) returns (GetRouteResponse);
  rpc ListRoutes(ListRoutesRequest) returns (ListRoutesResponse);
  rpc DeleteRoute(DeleteRouteRequest) returns (DeleteRouteResponse);
  rpc WatchRoute(WatchRouteRequest) returns (stream WatchRouteResponse);
}
