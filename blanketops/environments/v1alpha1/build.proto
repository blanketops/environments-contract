syntax = "proto3";

package blanketops.environments.v1alpha1;

import "google/protobuf/duration.proto";
import "google/protobuf/timestamp.proto";

option csharp_namespace = "BlanketOps.Environments.V1Alpha1";
option go_package = "github.com/ntlaletsi70/blanketops-environments-contract/blanketops/environments/v1alpha1;v1alpha1";

// -----------------------------------------------------------------------------
// Metadata
// -----------------------------------------------------------------------------

message Metadata {
  string id = 1;
  string name = 2;
  map<string, string> labels = 3;
}

// -----------------------------------------------------------------------------
// Build
// -----------------------------------------------------------------------------

message Build {
  Metadata metadata = 1;
  BuildSpec spec = 2;
  BuildStatus status = 3;
}

// -----------------------------------------------------------------------------
// Spec
// -----------------------------------------------------------------------------

message BuildSpec {
  string image = 1;
  BuildStrategy strategy = 2;
  GitSource source = 3;
  BuildPolicy policy = 4;
  ServiceAccount service_account = 5;
  repeated Param params = 6;
  google.protobuf.Duration timeout = 7;
  google.protobuf.Duration time_to_live = 8;
  google.protobuf.Timestamp duration = 9;
}

// -----------------------------------------------------------------------------
// Source
// -----------------------------------------------------------------------------

message GitSource {
  string url = 1;
  string revision = 2;
  string context_dir = 3;
  uint32 depth = 4;
  bool ssl_verify = 5;
  string clone_secret = 6;
}

// -----------------------------------------------------------------------------
// Strategy
// -----------------------------------------------------------------------------

message BuildStrategy {
  enum Kind {
    KIND_UNSPECIFIED = 0;
    KIND_CLUSTER = 1;
    KIND_NAMESPACED = 2;
  }

  string name = 1;
  Kind kind = 2;
}

// -----------------------------------------------------------------------------
// Policy
// -----------------------------------------------------------------------------

message BuildPolicy {
  repeated BuildTriggerPolicy allowed_triggers = 1;
  RetryPolicy retry = 2;
}

message BuildTriggerPolicy {
  enum Type {
    TYPE_UNSPECIFIED = 0;
    TYPE_MANUAL = 1;
    TYPE_PUSH = 2;
    TYPE_PULL_REQUEST = 3;
    TYPE_SCHEDULE = 4;
  }

  Type type = 1;
}

message RetryPolicy {
  bool on_failure = 1;
  uint32 max_attempts = 2;
}

// -----------------------------------------------------------------------------
// Identity
// -----------------------------------------------------------------------------

message ServiceAccount {
  string name = 1;
  string secret = 2;
}

// -----------------------------------------------------------------------------
// Parameters
// -----------------------------------------------------------------------------

message Param {
  string name = 1;
  string value = 2;
}

// -----------------------------------------------------------------------------
// Status
// -----------------------------------------------------------------------------

message BuildStatus {
  enum Phase {
    PHASE_UNSPECIFIED = 0;
    PHASE_PENDING = 1;
    PHASE_RUNNING = 2;
    PHASE_SUCCEEDED = 3;
    PHASE_FAILED = 4;
    PHASE_CANCELLED = 5;
  }

  Phase phase = 1;
  string image = 2;
  string execution_ref = 3;
  string message = 4;
  google.protobuf.Timestamp start_time = 5;
  google.protobuf.Timestamp completion_time = 6;
}

// -----------------------------------------------------------------------------
// Requests / Responses
// -----------------------------------------------------------------------------

message CreateBuildRequest {
  BuildSpec spec = 1;
}

message CreateBuildResponse {
  Build build = 1;
}

message GetBuildRequest {
  string id = 1;
}

message GetBuildResponse {
  Build build = 1;
}

message ListBuildsRequest {}

message ListBuildsResponse {
  repeated Build builds = 1;
}

message DeleteBuildRequest {
  string id = 1;
}

message DeleteBuildResponse {}

message WatchBuildRequest {
  string id = 1;
}

message WatchBuildResponse {
  Build build = 1;
}

// -----------------------------------------------------------------------------
// Service
// -----------------------------------------------------------------------------

service BuildService {
  rpc CreateBuild(CreateBuildRequest) returns (CreateBuildResponse);
  rpc GetBuild(GetBuildRequest) returns (GetBuildResponse);
  rpc ListBuilds(ListBuildsRequest) returns (ListBuildsResponse);
  rpc DeleteBuild(DeleteBuildRequest) returns (DeleteBuildResponse);
  rpc WatchBuild(WatchBuildRequest) returns (stream WatchBuildResponse);
}
