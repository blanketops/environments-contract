syntax = "proto3";
package blanketops.common.v1;
option csharp_namespace = "BlanketOps.Common.v1";
option go_package = "github.com/BlanketOps/environments-contract/blanketops/common/v1;commonv1";

message BuildTriggerSource {
  enum BuildTriggerSource {
    BUILD_TRIGGER_SOURCE_UNSPECIFIED = 0;
    // GitHub webhook, via the GitHubEvent pipeline.
    BUILD_TRIGGER_SOURCE_GITHUB = 1;
    // GitLab webhook (future).
    BUILD_TRIGGER_SOURCE_GITLAB = 2;
    // Manual dispatch — operator or CI invoking TriggerBuild.
    BUILD_TRIGGER_SOURCE_MANUAL = 3;
  }
  BuildTriggerSource source = 1;
}

message BuildTriggerType {
  enum BuildTriggerType {
    BUILD_TRIGGER_TYPE_UNSPECIFIED = 0;
    // A new commit pushed to a repository.
    BUILD_TRIGGER_TYPE_COMMIT = 1;
    // A pull request opened or updated.
    BUILD_TRIGGER_TYPE_PULL_REQUEST = 2;
    // A manual trigger, e.g. via kubectl or CI.
    BUILD_TRIGGER_TYPE_MANUAL = 3;
  }
  BuildTriggerType type = 1;
}

message BuildTriggerStatus {
  enum BuildTriggerStatus {
    BUILD_TRIGGER_STATUS_UNSPECIFIED = 0;
    // Trigger has been created but not yet evaluated by the controller.
    BUILD_TRIGGER_STATUS_PENDING = 1;
    // Controller has accepted the trigger and fired a BuildRun.
    BUILD_TRIGGER_STATUS_ACCEPTED = 2;
    // Controller has rejected the trigger based on policy or duplication.
    BUILD_TRIGGER_STATUS_REJECTED = 3;
    // BuildRun has completed; trigger is consumed and awaiting deletion.
    BUILD_TRIGGER_STATUS_CONSUMED = 4;
  }
  BuildTriggerStatus status = 1;
}
