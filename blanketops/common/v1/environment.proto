syntax = "proto3";
package blanketops.common.v1;
option csharp_namespace = "BlanketOps.Common.v1";
option go_package = "github.com/ntlaletsi70/blanketops-environments-contract/blanketops/common/v1;commonv1";

message EnvironmentPhase {
  enum EnvironmentPhase {
    ENVIRONMENT_PHASE_UNSPECIFIED = 0;
    // One or more composed resources are not yet ready.
    ENVIRONMENT_PHASE_PENDING = 1;
    // All composed resources are ready.
    ENVIRONMENT_PHASE_READY = 2;
    // The environment is serving but one or more resources are unhealthy.
    ENVIRONMENT_PHASE_DEGRADED = 3;
    // One or more composed resources failed.
    ENVIRONMENT_PHASE_FAILED = 4;
  }
  EnvironmentPhase phase = 1;
}
message EnvironmentType {
  enum EnvironmentType {
    ENVIRONMENT_TYPE_UNSPECIFIED = 0;
    // Development — ephemeral, relaxed guardrails.
    ENVIRONMENT_TYPE_DEVELOPMENT = 1;
    // Staging — production-shaped validation.
    ENVIRONMENT_TYPE_STAGING = 2;
    // Production — full guardrails.
    ENVIRONMENT_TYPE_PRODUCTION = 3;
    // Testing — CI-driven, short-lived.
    ENVIRONMENT_TYPE_TESTING = 4;
  }
  EnvironmentType type = 1;
}
// =============================================================================
// Contract
// =============================================================================
// SecretStoreProvider identifies the external secrets backend.
// Drives ESO ClusterSecretStore selection at reconciliation time.
message SecretStoreProvider {
  enum SecretStoreProvider {
   SECRET_STORE_PROVIDER_UNSPECIFIED = 0;
   // AWS Secrets Manager / SSM Parameter Store via ESO.
   SECRET_STORE_PROVIDER_AWS = 1;
   // HashiCorp Vault via ESO.
   SECRET_STORE_PROVIDER_VAULT = 2;
   // GCP Secret Manager via ESO.
   SECRET_STORE_PROVIDER_GCP = 3;
   // Azure Key Vault via ESO.
   SECRET_STORE_PROVIDER_AZURE = 4;
 }
  SecretStoreProvider secret_store_provider = 1;
}
// SecretStore declares which external secrets backend backs a resource.
message SecretStore {
  // Backend provider. Drives ESO ClusterSecretStore selection.
  SecretStoreProvider provider = 1;
}