syntax = "proto3";
package blanketops.common.v1;
option csharp_namespace = "BlanketOps.Common.v1";
option go_package = "github.com/BlanketOps/environments-contract/blanketops/common/v1;commonv1";

message GitProvider {
  // Source provider hosting the repository.
  enum GitProvider {
    GIT_PROVIDER_UNSPECIFIED = 0;
    GIT_PROVIDER_GITHUB = 1;
    GIT_PROVIDER_GITLAB = 2;
    GIT_PROVIDER_BITBUCKET = 3;
    GIT_PROVIDER_GENERIC_GIT = 4;
  }
  GitProvider provider = 1;
}

message GitEventType {
  // Provider events the platform may subscribe to.
  enum GitEventType {
    GIT_EVENT_TYPE_UNSPECIFIED = 0;
    GIT_EVENT_TYPE_PUSH = 1;
    GIT_EVENT_TYPE_PULL_REQUEST = 2;
    GIT_EVENT_TYPE_RELEASE = 3;
    GIT_EVENT_TYPE_TAG = 4;
  }
  GitEventType type = 1;
}
