// =============================================================================
// blanketops/common/v1/domain.proto
//
// Domain-specific shared types used by networks.blanketops.dev resources.
//
// All enum values are wrapped in a message (DomainPhase, DomainTLSStrategy,
// DomainTLSStatus) — consistent with the RoutePhase / RouteRuntime /
// RouteTLSStatus wrapper pattern in common/v1/route.proto.
//
// Consumers:
//   blanketops/networks/v1alpha1/domain.proto
//   resolution/domain/contract_adapter.go
// =============================================================================

syntax = "proto3";

package blanketops.common.v1;

// Options must match every other file in the blanketops.common.v1 package exactly.
option csharp_namespace = "BlanketOps.Common.v1";
option go_package = "github.com/blanketops/environments-contract/blanketops/common/v1;commonv1";
option java_outer_classname = "DomainProto";

// =============================================================================
// DomainPhase
//
// Lifecycle phase of a Domain CR. Set exclusively by the controller.
// =============================================================================
message DomainPhase {
  enum DomainPhase {
    // Unset — should never appear in a reconciled CR.
    DOMAIN_PHASE_UNSPECIFIED = 0;

    // Controller has accepted the CR but cert/mapping work has not started.
    DOMAIN_PHASE_PENDING = 1;

    // Cert or DomainMapping is being provisioned (Issuer, Certificate, or
    // DomainClaim are in-progress).
    DOMAIN_PHASE_PROVISIONING = 2;

    // Cert is issued, DomainMapping is active, and mTLS (when enforced) is
    // wired. The host is reachable.
    DOMAIN_PHASE_READY = 3;

    // Terminal failure — cert issuance failed, DomainMapping rejected, or
    // an ACME HTTP01 challenge could not be satisfied.
    DOMAIN_PHASE_FAILED = 4;
  }

  // phase is the current lifecycle value.
  DomainPhase phase = 1;
}

// =============================================================================
// DomainTLSStrategy
//
// Controls which cert provisioning path the Domain controller takes.
//
//   platform — The platform wildcard cert (*.dev.host) already covers this
//              host via a DNS01 ClusterIssuer. Controller emits DomainClaim +
//              DomainMapping only — no Certificate work is needed.
//
//   custom   — Client-owned zone (e.g. client-a.co.za). Controller emits
//              Issuer + DomainClaim + DomainMapping + Certificate. HTTP01
//              ACME challenge via the nginx solver in the tenant namespace.
// =============================================================================
message DomainTLSStrategy {
  enum DomainTLSStrategy {
    DOMAIN_TLS_STRATEGY_UNSPECIFIED = 0;

    // Platform wildcard cert path — DNS01 ClusterIssuer, already issued.
    // Controller emits DomainClaim + DomainMapping only.
    DOMAIN_TLS_STRATEGY_PLATFORM = 1;

    // Client-owned zone — HTTP01 cert path.
    // Controller emits Issuer + DomainClaim + DomainMapping + Certificate.
    DOMAIN_TLS_STRATEGY_CUSTOM = 2;
  }

  // strategy is the selected TLS provisioning path.
  DomainTLSStrategy strategy = 1;
}

// =============================================================================
// DomainTLSStatus
//
// Observed TLS provisioning state for a Domain. Set by the controller.
// =============================================================================
message DomainTLSStatus {
  enum DomainTLSStatus {
    DOMAIN_TLS_STATUS_UNSPECIFIED = 0;

    // TLS is not configured for this domain.
    DOMAIN_TLS_STATUS_DISABLED = 1;

    // Cert issuance or DomainMapping creation is in progress.
    DOMAIN_TLS_STATUS_PROVISIONING = 2;

    // Cert is valid and DomainMapping is serving TLS traffic.
    DOMAIN_TLS_STATUS_ACTIVE = 3;

    // Cert issuance failed or the cert has expired.
    DOMAIN_TLS_STATUS_FAILED = 4;
  }

  // status is the current TLS provisioning state.
  DomainTLSStatus status = 1;
}
