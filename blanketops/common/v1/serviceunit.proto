syntax = "proto3";
package blanketops.common.v1;
option csharp_namespace = "BlanketOps.Common.v1";
option go_package = "github.com/BlanketOps/environments-contract/blanketops/common/v1;commonv1";

message ServiceUnitDeploymentPhase {
  enum ServiceUnitDeploymentPhase {
    SERVICE_UNIT_DEPLOYMENT_PHASE_UNSPECIFIED = 0;
    SERVICE_UNIT_DEPLOYMENT_PHASE_PENDING = 1;
    SERVICE_UNIT_DEPLOYMENT_PHASE_DEPLOYING = 2;
    SERVICE_UNIT_DEPLOYMENT_PHASE_READY = 3;
    SERVICE_UNIT_DEPLOYMENT_PHASE_FAILED = 4;
  }
  ServiceUnitDeploymentPhase phase = 1;
}

message ServiceUnitType {
  enum ServiceUnitType {
    SERVICE_UNIT_TYPE_UNSPECIFIED = 0;
    SERVICE_UNIT_TYPE_STATIC = 1;
    SERVICE_UNIT_TYPE_BUILD = 2;
    SERVICE_UNIT_TYPE_SUPPLYCHAIN = 3;
  }
  ServiceUnitType type = 1;
}

message ServiceUnitRuntime {
  enum ServiceUnitRuntime {
    SERVICE_UNIT_RUNTIME_UNSPECIFIED = 0;
    SERVICE_UNIT_RUNTIME_KUBERNETES = 1;
    SERVICE_UNIT_RUNTIME_KNATIVE = 2;
    SERVICE_UNIT_RUNTIME_ECS = 3;
    SERVICE_UNIT_RUNTIME_WASM = 4;
  }
  ServiceUnitRuntime runtime = 1;
}
