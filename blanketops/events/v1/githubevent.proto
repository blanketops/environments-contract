syntax = "proto3";

package blanketops.events.v1;

import "blanketops/environments/common/v1/event.proto";
import "blanketops/environments/common/v1/metadata.proto";
import "google/protobuf/timestamp.proto";

option csharp_namespace = "BlanketOps.Events.V1";
option go_package = "github.com/ntlaletsi70/blanketops-environments-contract/blanketops/events/v1;v1";
option java_outer_classname = "GitHubEventProto";

// -----------------------------------------------------------------------------
// GitHubEvent
// -----------------------------------------------------------------------------
message GitHubEvent {
  blanketops.environments.common.v1.Metadata metadata = 1;
  GitHubEventSpec spec = 2;
  GitHubEventStatus status = 3;
}

// -----------------------------------------------------------------------------
// Spec
// -----------------------------------------------------------------------------
message GitHubEventSpec {
  // Repository in owner/name form (e.g. ntlaletsi70/my-app)
  string repository = 1;

  // Event type (push, pull_request, release, manual, etc.)
  blanketops.environments.common.v1.GitHubEventType event_type = 2;

  // Git ref associated with the event
  string ref = 3;

  // Commit SHA (if applicable)
  string commit_sha = 4;

  // Actor that caused the event
  string actor = 5;

  // External event identifier (GitHub delivery ID, etc.)
  string event_id = 6;

  // Timestamp when GitHub emitted the event
  google.protobuf.Timestamp occurred_at = 7;
}

// -----------------------------------------------------------------------------
// Status
// -----------------------------------------------------------------------------
message GitHubEventStatus {
  // Whether the event was accepted by the system
  bool accepted = 1;

  // Whether downstream execution was triggered
  bool triggered = 2;

  // Reference to the resource that was triggered
  string triggered_ref = 3;

  // Human-readable reason or explanation
  string reason = 4;

  // Time the event was processed
  google.protobuf.Timestamp processed_at = 5;
}
