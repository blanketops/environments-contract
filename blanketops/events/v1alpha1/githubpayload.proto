syntax = "proto3";
package blanketops.events.v1alpha1;

import "blanketops/common/event.proto";
import "blanketops/common/githubevent.proto";
import "blanketops/common/metadata.proto";
import "google/protobuf/timestamp.proto";

option csharp_namespace = "BlanketOps.Events.V1Alpha1";
option go_package = "github.com/ntlaletsi70/blanketops-environments-contract/blanketops/events/v1alpha1;v1alpha1";
option java_outer_classname = "GitHubPayloadProto";
option java_package = "v1alpha1.blanketops.events";

// =============================================================================
// GitHubPayload
//
// Platform-generated. Never user-declared.
// Created by the Argo Sensor on every matching webhook hit.
// Ephemeral — scrubbed after BuildTrigger evaluation. Auditable while live.
// GitHubEvent is the user-facing counterpart; GitHubPayload is the raw
// delivery record the BuildTrigger watches and evaluates for contract match.
// Pipeline chain:
//   GitRepository → GitHubEvent → Build → SupplyChain → Package → Deployment
// =============================================================================
// -----------------------------------------------------------------------------
// Resource
// -----------------------------------------------------------------------------
message GitHubPayload {
  // Standard BlanketOps metadata (name, namespace, labels, ownerRef).
  blanketops.common.Metadata metadata = 1;
  // The received delivery. Immutable once created.
  GitHubPayloadSpec spec = 2;
  // Observed state set by the BuildTrigger controller. Never manually edited.
  GitHubPayloadStatus status = 3;
}

// -----------------------------------------------------------------------------
// Spec (received delivery)
// -----------------------------------------------------------------------------
message GitHubPayloadSpec {
  // Repository the delivery originated from — owner/name.
  // e.g. ntlaletsi70/blanketops-environments-contract
  string repository = 1;
  // The provider event type. Defined in githubevent.proto, same package.
  blanketops.common.GitHubEventType event_type = 2;
  // Git ref the delivery applies to.
  // e.g. refs/heads/main, refs/tags/v0.1.0
  string ref = 3;
  // Commit SHA at the head of the delivery.
  // Passed through to the fired BuildRun on contract match.
  string commit_sha = 4;
  // Provider login of the actor who caused the event.
  string actor = 5;
  // Provider-assigned delivery ID. Used for idempotency and audit.
  string event_id = 6;
  // When the platform received the delivery.
  google.protobuf.Timestamp received_at = 7;
  // Name of the user-facing GitHubEvent CR this payload corresponds to.
  string github_event_ref = 8;
}

// -----------------------------------------------------------------------------
// Status (observed state)
// -----------------------------------------------------------------------------
message GitHubPayloadStatus {
  // Current lifecycle phase. Set by the BuildTrigger controller.
  blanketops.common.GitHubPayloadPhase phase = 1;
  // Name of the BuildTrigger that matched this payload, if any.
  string matched_trigger = 2;
  // Name of the Build CR patched by the matched trigger, if any.
  string build_ref = 3;
  // Human-readable reason for NO_MATCH or FAILED phases.
  string reason = 4;
  // When BuildTrigger evaluation completed.
  google.protobuf.Timestamp evaluated_at = 5;
  // Generation of the spec this status observes.
  int64 observed_generation = 6;
}

// -----------------------------------------------------------------------------
// Requests / Responses
// -----------------------------------------------------------------------------
// CreateGitHubPayload — record a received delivery.
// Platform-internal — called by the event ingestion path, never by users.
message CreateGitHubPayloadRequest {
  // The received delivery to record.
  GitHubPayloadSpec spec = 1;
}
message CreateGitHubPayloadResponse {
  // The created GitHubPayload including generated metadata and initial status.
  GitHubPayload github_payload = 1;
}

// GetGitHubPayload — fetch a GitHubPayload by name.
message GetGitHubPayloadRequest {
  // Name of the GitHubPayload CR to fetch.
  string name = 1;
}
message GetGitHubPayloadResponse {
  GitHubPayload github_payload = 1;
}

// ListGitHubPayloads — list GitHubPayload CRs with optional filtering and paging.
message ListGitHubPayloadsRequest {
  // Filter by source repository — owner/name.
  optional string repository = 1;
  // Filter by current lifecycle phase.
  optional blanketops.common.GitHubPayloadPhase phase = 2;
  // Filter by provider event type.
  optional blanketops.common.GitHubEventType event_type = 3;
  // Maximum number of results to return. Server may return fewer.
  optional int32 page_size = 4;
  // Token from a previous ListGitHubPayloadsResponse.next_page_token.
  // Omit for the first request.
  optional string page_token = 5;
}
message ListGitHubPayloadsResponse {
  // The list of GitHubPayload CRs matching the request filters.
  repeated GitHubPayload github_payloads = 1;
  // Token to retrieve the next page. Empty if no more results.
  optional string next_page_token = 2;
}

// DeleteGitHubPayload — delete a GitHubPayload CR.
// Payloads are normally scrubbed and garbage-collected by the controller;
// manual delete is for cleanup only.
message DeleteGitHubPayloadRequest {
  // Name of the GitHubPayload CR to delete.
  string name = 1;
}
message DeleteGitHubPayloadResponse {
  // True if the GitHubPayload was successfully deleted.
  bool success = 1;
}

// WatchGitHubPayload — stream state transitions for GitHubPayload CRs.
// Delivers an event for every controller reconciliation loop.
// This is the stream the BuildTrigger evaluation path observes.
message WatchGitHubPayloadRequest {
  // Name of a specific GitHubPayload CR to watch.
  // Mutually exclusive with label_selector.
  string name = 1;
  // Kubernetes label selector to watch a set of payloads.
  // e.g. environments.blanketops.dev/type=push
  string label_selector = 2;
}
message WatchGitHubPayloadResponse {
  // Current state of the GitHubPayload at this point in the stream.
  GitHubPayload github_payload = 1;
  // The type of change that triggered this stream event.
  blanketops.common.EventType type = 2;
}

// -----------------------------------------------------------------------------
// Service
// -----------------------------------------------------------------------------
service GitHubPayloadService {
  // ── CRD surface — payloads are immutable, no Update/Patch ───────────────
  // Record a received delivery. Platform-internal ingestion path.
  rpc CreateGitHubPayload(CreateGitHubPayloadRequest) returns (CreateGitHubPayloadResponse);
  // Fetch a GitHubPayload CR by name.
  rpc GetGitHubPayload(GetGitHubPayloadRequest) returns (GetGitHubPayloadResponse);
  // List GitHubPayload CRs with optional repository/phase/type filter and paging.
  rpc ListGitHubPayloads(ListGitHubPayloadsRequest) returns (ListGitHubPayloadsResponse);
  // Delete a GitHubPayload CR. Normally handled by scrub + garbage collection.
  rpc DeleteGitHubPayload(DeleteGitHubPayloadRequest) returns (DeleteGitHubPayloadResponse);
  // ── Streaming ────────────────────────────────────────────────────────────
  // Stream state transitions for GitHubPayload CRs by name or label selector.
  rpc WatchGitHubPayload(WatchGitHubPayloadRequest) returns (stream WatchGitHubPayloadResponse);
}
