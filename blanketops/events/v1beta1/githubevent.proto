syntax = "proto3";
package blanketops.events.v1beta1;

import "blanketops/common/v1/event.proto";
import "blanketops/common/v1/githubevent.proto";
import "blanketops/common/v1/metadata.proto";
import "google/protobuf/timestamp.proto";

option csharp_namespace = "BlanketOps.Events.V1Beta1";
option go_package = "github.com/blanketops/environments-contract/blanketops/events/v1beta1;v1beta1";
option java_outer_classname = "GitHubEventProto";
option java_package = "v1beta1.blanketops.events";

// =============================================================================
// GitHubEvent
//
// User-facing record of a Git provider event observed by the platform.
// Immutable once accepted — the controller writes status, never the spec.
// GitHubPayload is the platform-generated counterpart (auto, ephemeral,
// auditable); GitHubEvent is the user-facing surface.
// Pipeline chain:
//   GitRepository → GitHubEvent → Build → SupplyChain → Package → Deployment
// =============================================================================
// -----------------------------------------------------------------------------
// Resource
// -----------------------------------------------------------------------------
message GitHubEvent {
  // Standard BlanketOps metadata (name, namespace, labels, ownerRef).
  blanketops.common.v1.Metadata metadata = 1;
  // The observed event. Immutable once accepted.
  GitHubEventSpec spec = 2;
  // Observed state set by the controller. Never manually edited.
  GitHubEventStatus status = 3;
}

// -----------------------------------------------------------------------------
// Spec (observed event)
// -----------------------------------------------------------------------------
message GitHubEventSpec {
  // Repository the event originated from — owner/name.
  // e.g. ntlaletsi70/blanketops-environments-contract
  string repository = 1;
  // The provider event type.
  blanketops.common.v1.GitHubEventType event_type = 2;
  // Git ref the event applies to.
  // e.g. refs/heads/main, refs/tags/v0.1.0
  string ref = 3;
  // Commit SHA at the head of the event.
  string commit_sha = 4;
  // Provider login of the actor who caused the event.
  string actor = 5;
  // Provider-assigned delivery ID. Used for idempotency and audit.
  string event_id = 6;
  // When the event occurred on the provider.
  google.protobuf.Timestamp occurred_at = 7;
  // Name of the Kubernetes Secret containing the webhook HMAC secret
  // used to verify the delivery signature.
  // Sourced from the environment SecretStore via ExternalSecret.
  string webhook_secret_ref = 8;
}

// -----------------------------------------------------------------------------
// Status (observed state)
// -----------------------------------------------------------------------------
message GitHubEventStatus {
  // Whether the event passed signature verification and contract match.
  bool accepted = 1;
  // Whether the event resulted in a BuildTrigger firing.
  bool triggered = 2;
  // Name of the resource the event triggered, if any.
  // e.g. the Build CR patched by the BuildTrigger.
  string triggered_ref = 3;
  // Human-readable reason if not accepted or not triggered.
  string reason = 4;
  // When the controller finished processing the event.
  google.protobuf.Timestamp processed_at = 5;
}

// -----------------------------------------------------------------------------
// Requests / Responses
// -----------------------------------------------------------------------------
// CreateGitHubEvent — record a new event.
// Primary path for MANUAL dispatch; webhook deliveries arrive via
// platform-generated GitHubPayload, not this RPC.
message CreateGitHubEventRequest {
  // The event to record.
  GitHubEventSpec spec = 1;
}
message CreateGitHubEventResponse {
  // The created GitHubEvent including generated metadata and initial status.
  GitHubEvent github_event = 1;
}

// GetGitHubEvent — fetch a GitHubEvent by name.
message GetGitHubEventRequest {
  // Name of the GitHubEvent CR to fetch.
  string name = 1;
}
message GetGitHubEventResponse {
  GitHubEvent github_event = 1;
}

// ListGitHubEvents — list GitHubEvent CRs with optional filtering and paging.
message ListGitHubEventsRequest {
  // Filter by source repository — owner/name.
  optional string repository = 1;
  // Filter by provider event type.
  optional blanketops.common.v1.GitHubEventType event_type = 2;
  // Filter by whether the event fired a trigger.
  optional bool triggered = 3;
  // Maximum number of results to return. Server may return fewer.
  optional int32 page_size = 4;
  // Token from a previous ListGitHubEventsResponse.next_page_token.
  // Omit for the first request.
  optional string page_token = 5;
}
message ListGitHubEventsResponse {
  // The list of GitHubEvent CRs matching the request filters.
  repeated GitHubEvent github_events = 1;
  // Token to retrieve the next page. Empty if no more results.
  optional string next_page_token = 2;
}

// DeleteGitHubEvent — delete a GitHubEvent CR.
// Events are normally garbage-collected by TTL; manual delete is for cleanup.
message DeleteGitHubEventRequest {
  // Name of the GitHubEvent CR to delete.
  string name = 1;
}
message DeleteGitHubEventResponse {
  // True if the GitHubEvent was successfully deleted.
  bool success = 1;
}

// WatchGitHubEvent — stream state transitions for GitHubEvent CRs.
// Delivers an event for every controller reconciliation loop.
message WatchGitHubEventRequest {
  // Name of a specific GitHubEvent CR to watch.
  // Mutually exclusive with label_selector.
  string name = 1;
  // Kubernetes label selector to watch a set of events.
  // e.g. environments.blanketops.dev/type=push
  string label_selector = 2;
}
message WatchGitHubEventResponse {
  // Current state of the GitHubEvent at this point in the stream.
  GitHubEvent github_event = 1;
  // The type of change that triggered this stream event.
  blanketops.common.v1.EventType type = 2;
}

// -----------------------------------------------------------------------------
// Service
// -----------------------------------------------------------------------------
service GitHubEventService {
  // ── CRD surface — events are immutable, no Update/Patch ─────────────────
  // Record a new event. Primary path for MANUAL dispatch.
  rpc CreateGitHubEvent(CreateGitHubEventRequest) returns (CreateGitHubEventResponse);
  // Fetch a GitHubEvent CR by name.
  rpc GetGitHubEvent(GetGitHubEventRequest) returns (GetGitHubEventResponse);
  // List GitHubEvent CRs with optional repository/type/triggered filter and paging.
  rpc ListGitHubEvents(ListGitHubEventsRequest) returns (ListGitHubEventsResponse);
  // Delete a GitHubEvent CR. Normally handled by TTL garbage collection.
  rpc DeleteGitHubEvent(DeleteGitHubEventRequest) returns (DeleteGitHubEventResponse);
  // ── Streaming ────────────────────────────────────────────────────────────
  // Stream state transitions for GitHubEvent CRs by name or label selector.
  rpc WatchGitHubEvent(WatchGitHubEventRequest) returns (stream WatchGitHubEventResponse);
}
