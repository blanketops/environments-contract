syntax = "proto3";

package blanketops.networks.v1;

option go_package = "github.com/ntlaletsi70/blanketops-environments-contract/blanketops/networks/v1;v1";

import "google/protobuf/timestamp.proto";


// -----------------------------------------------------------------------------
// Route
// -----------------------------------------------------------------------------

message Route {
  RouteSpec spec = 1;
  RouteStatus status = 2;
}


// -----------------------------------------------------------------------------
// Spec
// -----------------------------------------------------------------------------

message RouteSpec {
  // Fully qualified domain name
  string host = 1;

  // Whether the route is active
  bool enabled = 2;

  // HTTP path to match ("/", "/v1", etc.)
  string path = 3;

  // Whether TLS is required
  bool tls_enabled = 4;

  // Runtime responsible for materializing this route
  // (kubernetes ingress, knative, gateway-api, etc.)
  RouteRuntime runtime = 5;
}


// -----------------------------------------------------------------------------
// Status
// -----------------------------------------------------------------------------

message RouteStatus {
  // High-level lifecycle phase
  RoutePhase phase = 1;

  // Human-readable message
  string message = 2;

  // Resolved address or endpoint
  // (e.g. load balancer hostname, URL)
  string resolved_address = 3;

  // TLS provisioning status
  TLSStatus tls_status = 4;

  // Conditions for UI / automation
  repeated RouteCondition conditions = 5;

  // Last status update
  google.protobuf.Timestamp last_updated_at = 6;
}


// -----------------------------------------------------------------------------
// Conditions
// -----------------------------------------------------------------------------

message RouteCondition {
  string type = 1;
  string status = 2;
  string reason = 3;
  string message = 4;
  google.protobuf.Timestamp last_transition_time = 5;
}


// -----------------------------------------------------------------------------
// Enums
// -----------------------------------------------------------------------------

enum RoutePhase {
  ROUTE_PHASE_UNSPECIFIED = 0;
  ROUTE_PHASE_PENDING = 1;
  ROUTE_PHASE_READY = 2;
  ROUTE_PHASE_DEGRADED = 3;
  ROUTE_PHASE_FAILED = 4;
}

enum RouteRuntime {
  ROUTE_RUNTIME_UNSPECIFIED = 0;
  ROUTE_RUNTIME_KUBERNETES_CONTAINER = 1;
  ROUTE_RUNTIME_KNATIVE_SERVICE = 2;
  ROUTE_RUNTIME_GATEWAY_API = 3;
}


enum TLSStatus {
  TLS_STATUS_UNSPECIFIED = 0;
  TLS_STATUS_DISABLED = 1;
  TLS_STATUS_PROVISIONING = 2;
  TLS_STATUS_ACTIVE = 3;
  TLS_STATUS_FAILED = 4;
}
