version: v2
inputs:
  - directory: .
    paths:
      - blanketops
plugins:
  # Go — local plugins baked into the runner image.
  # Generated into blanketops/ alongside protos so import paths resolve as
  # github.com/.../blanketops-environments-contract/blanketops/...
  # This matches the go_package option declared in every proto file and
  # keeps the module path stable across releases.
  - local: protoc-gen-go
    out: .
    opt:
      - paths=source_relative
  - local: protoc-gen-go-grpc
    out: .
    opt:
      - paths=source_relative

  # TypeScript — protobuf-es v2, messages + service descriptors.
  # Generated alongside protos for consistent import resolution.
  - local: protoc-gen-es
    out: .
    opt:
      - target=ts
      - import_extension=none