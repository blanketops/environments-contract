version: v2
inputs:
  - directory: .
    paths:
      - blanketops
plugins:
  # Go
  - remote: buf.build/protocolbuffers/go:v1.36.6
    out: gen/go
    opt:
      - paths=source_relative
  - remote: buf.build/grpc/go:v1.5.1
    out: gen/go
    opt:
      - paths=source_relative
  # C#
  - remote: buf.build/protocolbuffers/csharp:v29.3
    out: gen/csharp
  - remote: buf.build/grpc/csharp:v1.69.0
    out: gen/csharp
  # Java — no paths opt, java_package in protos handles namespacing
  - remote: buf.build/protocolbuffers/java:v29.3
    out: gen/java
  - remote: buf.build/grpc/java:v1.69.0
    out: gen/java
  # TypeScript — protobuf-es v2, messages + service descriptors
  - remote: buf.build/bufbuild/es:v2.2.5
    out: gen/ts
    opt:
      - target=ts
      - import_extension=none