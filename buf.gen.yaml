version: v1

plugins:
# -----------------------------
# Go
# -----------------------------
- plugin: go
  out: gen/go
  opt: paths=source_relative

- plugin: go-grpc
  out: gen/go
  opt: paths=source_relative

# -----------------------------
# C#
# -----------------------------
- plugin: csharp
  out: gen/csharp

- plugin: grpc_csharp
  out: gen/csharp

# -----------------------------
# Java
# -----------------------------
- plugin: java
  out: gen/java

- plugin: grpc-java
  out: gen/java
