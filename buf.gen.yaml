version: v2
inputs:
  - directory: .
    paths:
      - blanketops
plugins:
  # Go — generated into blanketops/ alongside protos so import paths
  # resolve as github.com/.../blanketops-environments-contract/blanketops/...
  # This matches the go_package option declared in every proto file and
  # keeps the module path stable across releases.
  - remote: buf.build/protocolbuffers/go:v1.36.6
    out: .
    opt:
      - paths=source_relative
  - remote: buf.build/grpc/go:v1.5.1
    out: .
    opt:
      - paths=source_relative

  # TypeScript — protobuf-es v2, messages + service descriptors.
  # Generated alongside protos for consistent import resolution.
  - remote: buf.build/bufbuild/es:v2.2.5
    out: .
    opt:
      - target=ts
      - import_extension=none